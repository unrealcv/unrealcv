name: C++ Quality

on:
  pull_request:
    paths:
      - 'Source/**/*.h'
      - 'Source/**/*.hpp'
      - 'Source/**/*.cpp'
      - '.clang-format'
      - '.clang-tidy'
      - '.github/workflows/cpp-quality.yml'

jobs:
  clang-format:
    name: clang-format (changed files)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Collect changed C++ files
        id: files
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED=$(git diff --name-only --diff-filter=ACMRT "origin/${{ github.base_ref }}...HEAD" | grep -E '^Source/.*\.(h|hpp|cpp)$' || true)
          {
            echo 'changed<<EOF'
            echo "$CHANGED"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Check formatting
        if: steps.files.outputs.changed != ''
        run: |
          echo "${{ steps.files.outputs.changed }}" | while IFS= read -r file; do
            [ -n "$file" ] || continue
            echo "Checking $file"
            clang-format --dry-run --Werror "$file"
          done

  clang-tidy:
    name: clang-tidy (advisory on changed files)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy

      - name: Collect changed C++ files
        id: files
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED=$(git diff --name-only --diff-filter=ACMRT "origin/${{ github.base_ref }}...HEAD" | grep -E '^Source/.*\.(h|hpp|cpp)$' || true)
          {
            echo 'changed<<EOF'
            echo "$CHANGED"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run clang-tidy (advisory)
        if: steps.files.outputs.changed != ''
        continue-on-error: true
        run: |
          mkdir -p .artifacts
          : > .artifacts/clang-tidy.txt
          echo "${{ steps.files.outputs.changed }}" | while IFS= read -r file; do
            [ -n "$file" ] || continue
            echo "===== $file =====" | tee -a .artifacts/clang-tidy.txt
            clang-tidy "$file" --extra-arg=-std=c++17 -- -I Source/UnrealCV/Public 2>&1 | tee -a .artifacts/clang-tidy.txt
            echo | tee -a .artifacts/clang-tidy.txt
          done

      - name: Upload advisory report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: .artifacts/clang-tidy.txt
