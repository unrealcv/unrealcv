name: Python quality

on:
  push:
    paths:
      - 'client/python/**'
      - 'test/**'
      - '.pre-commit-config.yaml'
      - '.github/workflows/python-quality.yml'
  pull_request:
    paths:
      - 'client/python/**'
      - 'test/**'
      - '.pre-commit-config.yaml'
      - '.github/workflows/python-quality.yml'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff check
        run: ruff check unrealcv

      - name: Ruff format check
        run: ruff format --check unrealcv

      - name: Mypy
        run: mypy unrealcv

      - name: Pytest collect health check
        run: pytest --collect-only ../../test/client
